name: Test Suite

on:
  push:
    branches: [ main, develop, 160 ]
  pull_request:
    branches: [ main, develop ]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      
      - name: Install backend dependencies
        run: |
          cd backend
          npm ci
      
      - name: Run unit tests
        run: |
          cd backend
          npm run test:unit
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-key-for-ci
      
      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: unit-test-results
          path: backend/coverage/

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: sentinel
          POSTGRES_PASSWORD: sentinel_test_password
          POSTGRES_DB: sentinel_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      
      - name: Install backend dependencies
        run: |
          cd backend
          npm ci
      
      - name: Run database migrations
        run: |
          cd backend
          npm run db:migrate
        env:
          DATABASE_URL: postgresql://sentinel:sentinel_test_password@localhost:5432/sentinel_test
      
      - name: Run integration tests
        run: |
          cd backend
          npm run test:integration
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-key-for-ci
          DATABASE_URL: postgresql://sentinel:sentinel_test_password@localhost:5432/sentinel_test
      
      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: integration-test-results
          path: backend/coverage/

  e2e-tests:
    name: E2E Chaos Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: sentinel
          POSTGRES_PASSWORD: sentinel_test_password
          POSTGRES_DB: sentinel_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install backend dependencies
        run: |
          cd backend
          npm ci
      
      - name: Install CLI dependencies
        run: |
          cd cli
          npm ci
      
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Start test services
        run: |
          docker-compose -f docker-compose.yml up -d
        env:
          DATABASE_URL: postgresql://sentinel:sentinel_test_password@localhost:5432/sentinel_test
      
      - name: Wait for services to be ready
        run: |
          timeout 60 bash -c 'until docker ps | grep -q "Up"; do sleep 2; done'
      
      - name: Run E2E chaos tests
        run: |
          cd backend
          chmod +x __tests__/run-e2e.sh
          ./__tests__/run-e2e.sh
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-key-for-ci
          DATABASE_URL: postgresql://sentinel:sentinel_test_password@localhost:5432/sentinel_test
          AUTO_HEAL_TIMEOUT_MS: 10000
      
      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: e2e-test-results
          path: |
            backend/coverage/
            /tmp/sentinel-backend-test.log
      
      - name: Cleanup
        if: always()
        run: |
          docker-compose -f docker-compose.yml down -v

  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      
      - name: Install backend dependencies
        run: |
          cd backend
          npm ci
      
      - name: Run tests with coverage
        run: |
          cd backend
          npm run test:coverage
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-key-for-ci
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage/lcov.info
          flags: backend
          name: sentinel-backend
          fail_ci_if_error: false
      
      - name: Generate coverage badge
        run: |
          cd backend
          npx coverage-badge-creator
        continue-on-error: true
      
      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: romeovs/lcov-reporter-action@v0.3.1
        with:
          lcov-file: ./backend/coverage/lcov.info
          github-token: ${{ secrets.GITHUB_TOKEN }}

  cli-tests:
    name: CLI Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: cli/package-lock.json
      
      - name: Install CLI dependencies
        run: |
          cd cli
          npm ci
      
      - name: Run CLI tests
        run: |
          cd cli
          npm test
      
      - name: Upload CLI test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: cli-test-results
          path: cli/coverage/
